    Minimal x402 payments on Arbitrum One, settled by the Coinbase CDP facilitator
  </text>

  <g transform="translate(640, 220)" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace" font-size="13" font-weight="500">
    <rect x="-209" y="-16" width="95" height="30" rx="15" fill="#12AAFF" fill-opacity="0.12" stroke="#12AAFF" stroke-opacity="0.25"/>
    <text x="-161.5" y="4" text-anchor="middle" fill="#12AAFF">TypeScript</text>

    <rect x="-102" y="-16" width="55" height="30" rx="15" fill="#12AAFF" fill-opacity="0.12" stroke="#12AAFF" stroke-opacity="0.25"/>
    <text x="-74.5" y="4" text-anchor="middle" fill="#12AAFF">x402</text>

    <rect x="-35" y="-16" width="110" height="30" rx="15" fill="#12AAFF" fill-opacity="0.12" stroke="#12AAFF" stroke-opacity="0.25"/>
    <text x="20" y="4" text-anchor="middle" fill="#12AAFF">Arbitrum One</text>

    <rect x="87" y="-16" width="55" height="30" rx="15" fill="#12AAFF" fill-opacity="0.12" stroke="#12AAFF" stroke-opacity="0.25"/>
    <text x="114.5" y="4" text-anchor="middle" fill="#12AAFF">USDC</text>

    <rect x="154" y="-16" width="55" height="30" rx="15" fill="#12AAFF" fill-opacity="0.12" stroke="#12AAFF" stroke-opacity="0.25"/>
    <text x="181.5" y="4" text-anchor="middle" fill="#12AAFF">CDP</text>
